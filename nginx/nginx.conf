# ─────────────────────────────────────────────
# Nginx Configuration for Koffeecart
# ─────────────────────────────────────────────

upstream django_app {
	    # "web" is the Docker Compose service name for Django
	    # Docker's internal DNS resolves this automatically
	    server web:8000;
}

server {
	    listen 80;
	        server_name localhost;  # Change to your domain/IP in production

			    # ── Max upload size (for product images etc.) ──
			    client_max_body_size 20M;

		    # ── Static files ───────────────────────────────
		    # Nginx serves these directly — fast, no Django involved
		    location /static/ {
			            alias /app/staticfiles/;
				            expires 30d;
					            add_header Cache-Control "public, no-transform";
						        }

		        # ── Media files (user uploads) ─────────────────
		        location /media/ {
				        alias /app/media/;
					        expires 7d;
						    }

			    # ── All other requests → Django via Gunicorn ───
			    location / {
				            proxy_pass http://django_app;

					            # Pass real client info to Django
					            proxy_set_header Host $host;
						            proxy_set_header X-Real-IP $remote_addr;
							            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
								            proxy_set_header X-Forwarded-Proto $scheme;

									            # Timeouts
									            proxy_connect_timeout 60s;
										            proxy_read_timeout 60s;
											        }

			        # ── Custom error pages (optional but professional) ─
			        error_page 404 /404.html;
				    error_page 500 502 503 504 /50x.html;
}
